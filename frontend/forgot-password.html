<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | IntelliTrip</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Auth Pages Specific Styles (Copied & Adapted from login.html for consistency) */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--sand-100) 0%, var(--blue-200) 100%);
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5 2.24 5 5z' fill='%232a8faa' fill-opacity='0.1' fill-rule='evenodd'/%3E%3C/svg%3E");
            opacity: 0.3;
        }

        .auth-card {
            background: var(--white);
            border-radius: var(--border-radius-lg);
            padding: 3rem;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow-xl);
            position: relative;
            z-index: 1;
            border: 1px solid var(--blue-200);
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header .logo {
            justify-content: center;
            margin-bottom: 1.25rem;
            gap: 15px;
        }

        .auth-header .logo-img {
            width: 48px;
            height: 48px;
            border: 2px solid var(--blue-400);
            box-shadow: 0 4px 12px rgba(42, 143, 170, 0.2);
        }

        .auth-header h2 {
            color: var(--navy-900);
            margin-bottom: 0.75rem;
            font-size: 1.75rem;
        }

        .auth-header p {
            color: var(--gray-500);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-control {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid var(--blue-200);
            border-radius: var(--border-radius);
            font-size: 1rem;
            transition: var(--transition);
            background: var(--gray-50);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--blue-600);
            box-shadow: 0 0 0 4px rgba(42, 143, 170, 0.15);
            background: var(--white);
        }

        .auth-btn {
            width: 100%;
            padding: 0.9rem;
            background: var(--gradient-sky);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(42, 143, 170, 0.3);
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(42, 143, 170, 0.4);
        }

        .auth-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
            display: block;
            color: var(--blue-600);
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* OTP Input Styling */
        .otp-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 1.5rem 0;
        }

        .otp-input {
            width: 45px;
            height: 50px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 600;
            border: 2px solid var(--blue-200);
            border-radius: 8px;
            background: var(--white);
        }

        .otp-input:focus {
            border-color: var(--blue-600);
            outline: none;
            box-shadow: 0 0 0 3px rgba(42, 143, 170, 0.15);
        }

        /* Message Styling */
        .message-box {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            text-align: center;
            display: none;
            font-size: 0.9rem;
        }

        .message-box.error {
            background-color: #fff5f5;
            color: #e53e3e;
            border: 1px solid #fed7d7;
        }

        .message-box.success {
            background-color: #f0fff4;
            color: #38a169;
            border: 1px solid #c6f6d5;
        }

        .step {
            display: none;
            margin-top: 1rem;
        }

        .step.active {
            display: block;
            animation: fadeIn 0.4s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Toast Notifications */
        #toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast {
            background: var(--white);
            color: var(--navy-900);
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: var(--shadow-xl);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            min-width: 300px;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border-left: 6px solid var(--blue-600);
            animation: toastSlideIn 0.3s forwards;
            border: 1px solid var(--blue-200);
        }

        .toast.error {
            border-left-color: var(--error);
        }

        .toast.success {
            border-left-color: var(--success);
        }

        .toast.hide {
            animation: toastSlideOut 0.3s forwards;
        }

        @keyframes toastSlideIn {
            to {
                transform: translateX(0);
            }
        }

        @keyframes toastSlideOut {
            to {
                transform: translateX(120%);
            }
        }

        @media (max-width: 768px) {
            #toast-container {
                top: auto;
                bottom: 24px;
                right: 12px;
                left: 12px;
            }

            .toast {
                min-width: auto;
            }
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <img src="logo.jpeg" alt="IntelliTrip" class="logo-img">
                    <p style="font-weight:700; font-size:1.2rem; color:var(--navy-900); margin-top:0.5rem">IntelliTrip
                    </p>
                </div>
                <h2 id="pageTitle">Reset Password</h2>
                <p id="pageSubtitle">Follow the steps to recover your account</p>
            </div>

            <div id="messageBox" class="message-box"></div>

            <!-- Step 1: Send OTP -->
            <div id="step1" class="step active">
                <form id="emailForm">
                    <div class="form-group">
                        <label style="font-weight:600; color:var(--navy-700); margin-bottom:0.5rem; display:block">Email
                            Address</label>
                        <input type="email" id="email" class="form-control" placeholder="Enter your registered email"
                            required>
                    </div>
                    <button type="submit" class="auth-btn" id="sendOtpBtn">Send Verification Code</button>
                </form>
            </div>

            <!-- Step 2: Verify OTP -->
            <div id="step2" class="step">
                <p style="text-align:center; margin-bottom:1rem; color:var(--gray-600);">Enter the 6-digit code sent to
                    <br><b id="displayEmail"></b>
                </p>
                <form id="otpForm">
                    <div class="otp-group" id="otpContainer">
                        <input type="text" class="otp-input" maxlength="1" pattern="\d*">
                        <input type="text" class="otp-input" maxlength="1" pattern="\d*">
                        <input type="text" class="otp-input" maxlength="1" pattern="\d*">
                        <input type="text" class="otp-input" maxlength="1" pattern="\d*">
                        <input type="text" class="otp-input" maxlength="1" pattern="\d*">
                        <input type="text" class="otp-input" maxlength="1" pattern="\d*">
                    </div>
                    <button type="submit" class="auth-btn" id="verifyOtpBtn">Verify Code</button>
                </form>
                <div style="text-align:center; margin-top:1rem;">
                    <button class="btn-link" onclick="location.reload()"
                        style="background:none; border:none; color:var(--blue-600); cursor:pointer;">Resend / Change
                        Email</button>
                </div>
            </div>

            <!-- Step 3: New Password -->
            <div id="step3" class="step">
                <form id="resetForm">
                    <div class="form-group">
                        <label style="font-weight:600; color:var(--navy-700); margin-bottom:0.5rem; display:block">New
                            Password</label>
                        <input type="password" id="newPassword" class="form-control" placeholder="Min. 6 characters"
                            required>
                    </div>
                    <div class="form-group">
                        <label
                            style="font-weight:600; color:var(--navy-700); margin-bottom:0.5rem; display:block">Confirm
                            Password</label>
                        <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter password"
                            required>
                    </div>
                    <button type="submit" class="auth-btn" id="resetBtn">Reset Password</button>
                </form>
            </div>

            <a href="login.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
        </div>
    </div>

    <script>
        const API_URL = '/api/auth';

        // State
        let currentEmail = '';
        let currentOtp = '';

        // Elements
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const step3 = document.getElementById('step3');
        const messageBox = document.getElementById('messageBox');

        // OTP Inputs Logic
        const otpInputs = document.querySelectorAll('.otp-input');
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < 5) otpInputs[index + 1].focus();
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) otpInputs[index - 1].focus();
            });
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const data = e.clipboardData.getData('text').slice(0, 6);
                data.split('').forEach((char, i) => {
                    if (otpInputs[i]) otpInputs[i].value = char;
                });
            });
        });

        function getOtpValue() {
            return Array.from(otpInputs).map(i => i.value).join('');
        }

        function showToast(message, type = 'error') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                document.body.appendChild(container);
            }

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle';
            toast.innerHTML = `<i class="fas ${icon}"></i> <span>${message}</span>`;
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        function showMessage(msg, type) {
            messageBox.textContent = msg;
            messageBox.className = `message-box ${type}`;
            messageBox.style.display = 'block';
        }

        function validateEmailInput(email) {
            const emailRegex = /^[a-zA-Z0-9._%+-]{3,}@[a-zA-Z0-9.-]{2,}\.[a-zA-Z]{2,10}$/;
            const trimmedEmail = email.trim().toLowerCase();

            if (!trimmedEmail) return { valid: false, msg: 'Email is required' };
            if (!emailRegex.test(trimmedEmail)) {
                return { valid: false, msg: 'Please enter a valid email address' };
            }

            const [local, domain] = trimmedEmail.split('@');

            if (local.length < 3) {
                return { valid: false, msg: 'Email prefix is too short (min 3 characters)' };
            }
            if (domain.length < 4) {
                return { valid: false, msg: 'Domain name is too short' };
            }

            const domainPrefix = domain.split('.')[0];
            if (domainPrefix === 'g' || domainPrefix === 'gm' || domainPrefix === 'gmai') {
                return { valid: false, msg: 'Invalid domain. Did you mean gmail.com?' };
            }
            if (domainPrefix === 'y' || domainPrefix === 'yah' || domainPrefix === 'yaho') {
                return { valid: false, msg: 'Invalid domain. Did you mean yahoo.com?' };
            }

            return { valid: true };
        }

        const emailInput = document.getElementById('email');
        emailInput.addEventListener('blur', function () {
            const validation = validateEmailInput(this.value);
            if (this.value && !validation.valid) {
                showToast(validation.msg, 'error');
                this.style.borderColor = '#e53e3e';
                messageBox.style.display = 'none';
            } else {
                this.style.borderColor = 'var(--blue-200)';
            }
        });

        // Step 1: Send OTP
        document.getElementById('emailForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('sendOtpBtn');
            const email = emailInput.value.trim();

            const emailValidation = validateEmailInput(email);
            if (!emailValidation.valid) {
                showToast(emailValidation.msg, 'error');
                return;
            }

            try {
                btn.disabled = true;
                btn.textContent = 'Sending...';
                messageBox.style.display = 'none';

                const res = await fetch(`${API_URL}/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();

                if (res.ok) {
                    currentEmail = email;
                    document.getElementById('displayEmail').textContent = email;
                    step1.classList.remove('active');
                    step2.classList.add('active');
                    document.getElementById('pageTitle').textContent = 'Verify Email';
                    showMessage('Verification code sent!', 'success');
                } else {
                    showMessage(data.msg || 'Error sending OTP', 'error');
                }
            } catch (err) {
                showMessage('Network error. Check server.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Verification Code';
            }
        });

        // Step 2: Verify OTP
        document.getElementById('otpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('verifyOtpBtn');
            const otp = getOtpValue();

            if (otp.length !== 6) {
                showMessage('Please enter the full 6-digit code', 'error');
                return;
            }

            try {
                btn.disabled = true;
                btn.textContent = 'Verifying...';

                // Add verification endpoint call here
                const res = await fetch(`${API_URL}/verify-reset-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentEmail, otp })
                });

                const data = await res.json();

                if (res.ok) {
                    currentOtp = otp;
                    step2.classList.remove('active');
                    step3.classList.add('active');
                    document.getElementById('pageTitle').textContent = 'New Password';
                    showMessage('Code verified! Set your new password.', 'success');
                } else {
                    showMessage(data.msg || 'Invalid code', 'error');
                }

            } catch (err) {
                showMessage('Verification failed', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Verify Code';
            }
        });

        // Step 3: Reset Password
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('resetBtn');
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            try {
                btn.disabled = true;
                btn.textContent = 'Resetting...';

                const res = await fetch(`${API_URL}/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: currentEmail,
                        otp: currentOtp,
                        newPassword,
                        confirmPassword
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    showMessage(data.msg, 'success');
                    setTimeout(() => location.href = 'login.html', 2000);
                } else {
                    showMessage(data.msg || 'Reset failed', 'error');
                }
            } catch (err) {
                showMessage('Server error', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        });
    </script>
</body>

</html>
